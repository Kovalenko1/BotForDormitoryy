services:
  bot:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8000
      WEB_SSL_CERTFILE: ""
      WEB_SSL_KEYFILE: ""
      WEB_SSL_KEYFILE_PASSWORD: ""
      WEB_FORCE_HTTPS: "false"
    command: python run_webapp.py
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "6565:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
