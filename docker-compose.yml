services:
  bot:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - .git/
            - .idea/
            - .venv/
            - __pycache__/
            - node_modules/
            - dashboard/node_modules/
            - dashboard/dist/
            - certs/
            - .env
        - action: rebuild
          path: requirements.txt
        - action: rebuild
          path: Dockerfile
        - action: rebuild
          path: dashboard/package.json
        - action: rebuild
          path: dashboard/package-lock.json
        - action: rebuild
          path: dashboard/src

  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8000
      WEB_SSL_CERTFILE: ""
      WEB_SSL_KEYFILE: ""
      # WEB_SSL_CERTFILE: /etc/letsencrypt/live/dormitory6.duckdns.org
      # WEB_SSL_KEYFILE: /etc/letsencrypt/live/dormitory6.duckdns.org
      # WEB_SSL_KEYFILE_PASSWORD: ""
      # WEB_FORCE_HTTPS: "false"
      WEB_FORCE_HTTPS: "true"
    command: python run_webapp.py
    depends_on:
      postgres:
        condition: service_healthy
    ports:
        - "8080:8000"
        # - "8443:8000"
    volumes:
        - /etc/letsencrypt:/etc/letsencrypt:ro
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - .git/
            - .idea/
            - .venv/
            - __pycache__/
            - node_modules/
            - dashboard/node_modules/
            - dashboard/dist/
            - certs/
            - .env
        - action: rebuild
          path: requirements.txt
        - action: rebuild
          path: Dockerfile
        - action: rebuild
          path: dashboard/package.json
        - action: rebuild
          path: dashboard/package-lock.json
        - action: rebuild
          path: dashboard/src

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "6565:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
